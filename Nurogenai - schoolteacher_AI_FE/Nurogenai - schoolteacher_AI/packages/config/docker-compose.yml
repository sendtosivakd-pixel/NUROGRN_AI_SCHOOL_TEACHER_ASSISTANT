services:
  postgres:
    image: postgres:16-alpine
    container_name: student-analytics-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: student_analytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - student_analytics_pgdata:/var/lib/postgresql/data

volumes:
  student_analytics_pgdata:
